name: Deploy to WordPress.org
on:
  push:
    tags:
      - "*"
jobs:
  tag:
    name: New tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version consistency check
        run: |
          SLUG="wenprise-alipay-checkout-for-woocommerce"
          
          # Extract versions and remove carriage returns/whitespace
          README_VERSION=$(grep -i "Stable tag:" readme.txt | cut -d: -f2 | tr -d '\r' | xargs)
          PLUGIN_VERSION=$(grep -i "Version:" "$SLUG.php" | cut -d: -f2 | tr -d '\r' | xargs)
          GIT_TAG=${GITHUB_REF#refs/tags/}
          GIT_VERSION=${GIT_TAG#v}

          echo "ℹ︎ Readme version: $README_VERSION"
          echo "ℹ︎ Plugin version: $PLUGIN_VERSION"
          echo "ℹ︎ Git version:    $GIT_VERSION"

          if [ "$README_VERSION" != "$GIT_VERSION" ]; then
            echo "❌ ERROR: Readme 'Stable tag' ($README_VERSION) does not match Git tag ($GIT_VERSION)"
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$GIT_VERSION" ]; then
            echo "❌ ERROR: Plugin 'Version' ($PLUGIN_VERSION) does not match Git tag ($GIT_VERSION)"
            exit 1
          fi
          
          echo "✅ Version consistency check passed!"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: wenprise-alipay-checkout-for-woocommerce